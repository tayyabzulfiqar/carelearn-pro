services:
  postgres:
    image: postgres:16-alpine
    container_name: carelearn-postgres
    restart: always
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-32768}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: carelearn-api:latest
    container_name: carelearn-api
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES: ${JWT_EXPIRES:-24h}
      CORS_ORIGIN: ${CORS_ORIGIN}
    volumes:
      - api_uploads:/app/apps/api/uploads
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: carelearn-web:latest
    container_name: carelearn-web
    restart: always
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8081').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
    depends_on:
      api:
        condition: service_healthy
    networks:
      - app_net

  nginx:
    image: nginx:1.27-alpine
    container_name: carelearn-edge
    restart: always
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN}
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/includes:/etc/nginx/includes:ro
      - ./docker/nginx/entrypoint.sh:/entrypoint.sh:ro
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - app_net

  worker:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    image: carelearn-api:latest
    container_name: carelearn-worker
    restart: always
    command: ["node", "apps/api/src/worker.js"]
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      WORKER_QUEUES: email_delivery,notifications,compliance,subscriptions,reports,exports,certificates
      WORKER_CONCURRENCY: 2
      WORKER_POLL_MS: 2000
    volumes:
      - api_uploads:/app/apps/api/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('./apps/api/src/config/database').query('SELECT 1').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net

  certbot:
    image: certbot/certbot:latest
    container_name: carelearn-certbot
    restart: always
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt

volumes:
  postgres_data:
  api_uploads:
  certbot_www:
  certbot_certs:

networks:
  app_net:
    name: carelearn_app_net
    driver: bridge